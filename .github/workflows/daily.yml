name: Taiwan Stock AI Daily

on:
  push:
    branches:
      - main
  schedule:
    # 07:58 Asia/Taipei, Monday-Friday: update GitHub Pages dashboard.
    - cron: "58 23 * * 0-4"
    # 08:18 Asia/Taipei, Monday-Friday: send Telegram morning report.
    - cron: "18 0 * * 1-5"
  workflow_dispatch:
    inputs:
      send_telegram:
        description: "Also send Telegram report"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: tw-stock-ai-daily
  cancel-in-progress: false

jobs:
  dashboard-update:
    name: 07:58 update dashboard
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '58 23 * * 0-4'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard without Telegram
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py --dry-run --telegram-summary

      - name: Commit and push dashboard
        run: |
          mkdir -p docs
          cp -f dashboard/index.html docs/index.html
          cp -f dashboard/dashboard_data.json docs/dashboard_data.json
          cp -f dashboard/performance.html docs/performance.html
          cp -f dashboard/performance_data.json docs/performance_data.json
          cp -f dashboard/theme_history.json docs/theme_history.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/
          git add docs/
          git add data/tw_stock_ai.sqlite3 || true
          git diff --cached --quiet || git commit -m "auto: dashboard $(date -u +'%Y-%m-%d')"
          git push

      - name: Notify dashboard failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Taiwan Stock AI 07:58 dashboard update failed. Please check GitHub Actions."
          fi

  morning-telegram:
    name: 08:18 send Telegram
    if: >-
      github.event.schedule == '18 0 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.send_telegram == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram morning report
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py --send-telegram --telegram-summary

      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Taiwan Stock AI 08:18 Telegram report failed. Please check GitHub Actions."
          fi
