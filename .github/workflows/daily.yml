name: Taiwan Stock AI Daily

on:
  push:
    branches:
      - main
  schedule:
    # 04:30 / 05:00 Asia/Taipei, Monday-Friday: update GitHub Pages dashboard.
    - cron: "30 20 * * 0-4"
    - cron: "0 21 * * 0-4"
    # 07:20 / 07:35 / 07:50 / 08:05 Asia/Taipei, Monday-Friday: send Telegram morning report.
    # Multiple backups are safe because delivery_log prevents duplicate morning reports.
    - cron: "20 23 * * 0-4"
    - cron: "35 23 * * 0-4"
    - cron: "50 23 * * 0-4"
    - cron: "5 0 * * 1-5"
  workflow_dispatch:
    inputs:
      task:
        description: "Job to run"
        required: false
        default: "dashboard"
        type: choice
        options:
          - "dashboard"
          - "telegram"
          - "all"
      send_telegram:
        description: "Legacy: also send Telegram report"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      scheduled_at_taipei:
        description: "Optional ISO timestamp for the intended Asia/Taipei run time"
        required: false
        default: ""
      scheduler:
        description: "Optional scheduler name, for example cloudflare-worker"
        required: false
        default: ""
      scheduler_cron:
        description: "Optional original scheduler cron expression"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: tw-stock-ai-daily
  cancel-in-progress: false

jobs:
  dashboard-update:
    name: 04:30/05:00 update dashboard
    if: >-
      github.event_name == 'push' ||
      github.event.schedule == '30 20 * * 0-4' ||
      github.event.schedule == '0 21 * * 0-4' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          inputs.task == 'dashboard' ||
          inputs.task == 'all' ||
          (inputs.task == '' && inputs.send_telegram != 'true')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set scheduler metadata
        env:
          INPUT_SCHEDULED_AT_TAIPEI: ${{ inputs.scheduled_at_taipei }}
          INPUT_SCHEDULER: ${{ inputs.scheduler }}
          INPUT_SCHEDULER_CRON: ${{ inputs.scheduler_cron }}
        run: |
          task="dashboard"
          scheduler="${INPUT_SCHEDULER:-${GITHUB_EVENT_NAME}}"
          cron="${INPUT_SCHEDULER_CRON:-${{ github.event.schedule }}}"
          target="${INPUT_SCHEDULED_AT_TAIPEI}"
          if [ -z "$target" ]; then
            case "${{ github.event.schedule }}" in
              "30 20 * * 0-4") target="$(TZ=Asia/Taipei date +'%Y-%m-%d')T04:30:00+08:00" ;;
              "0 21 * * 0-4") target="$(TZ=Asia/Taipei date +'%Y-%m-%d')T05:00:00+08:00" ;;
            esac
          fi
          {
            echo "SCHEDULED_TASK=$task"
            echo "SCHEDULED_BY=$scheduler"
            echo "SCHEDULED_CRON=$cron"
            echo "SCHEDULED_TARGET_TAIPEI=$target"
          } >> "$GITHUB_ENV"

      - name: Update retail divergence signals
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python retail_divergence_job.py || echo "Retail divergence update skipped"

      - name: Generate dashboard without Telegram
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py --dry-run --telegram-summary

      - name: Commit and push dashboard
        run: |
          git fetch origin main
          current_head="$(git rev-parse HEAD)"
          remote_head="$(git rev-parse origin/main)"
          if [ "$current_head" != "$remote_head" ]; then
            echo "Remote main moved from ${current_head} to ${remote_head}."
            echo "This workflow run is stale, so dashboard output will not be pushed."
            exit 0
          fi
          mkdir -p docs
          cp -f dashboard/index.html docs/index.html
          cp -f dashboard/dashboard_data.json docs/dashboard_data.json
          cp -f dashboard/performance.html docs/performance.html
          cp -f dashboard/performance_data.json docs/performance_data.json
          cp -f dashboard/theme_history.json docs/theme_history.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/
          git add docs/
          git add data/tw_stock_ai.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No dashboard changes"
            exit 0
          fi
          git commit -m "auto: dashboard $(date -u +'%Y-%m-%d')"
          if ! git push 2>push.err; then
            cat push.err
            if grep -qE "fetch first|non-fast-forward|failed to push some refs" push.err; then
              echo "Remote main changed during this run; skip stale dashboard push."
              exit 0
            fi
            exit 1
          fi

      - name: Notify dashboard failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Taiwan Stock AI dashboard update failed. Please check GitHub Actions."
          fi

  morning-telegram:
    name: 07:20/07:35/07:50/08:05 send Telegram
    if: >-
      github.event.schedule == '20 23 * * 0-4' ||
      github.event.schedule == '35 23 * * 0-4' ||
      github.event.schedule == '50 23 * * 0-4' ||
      github.event.schedule == '5 0 * * 1-5' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          inputs.task == 'telegram' ||
          inputs.task == 'all' ||
          inputs.send_telegram == 'true'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest persisted state
        run: git pull --ff-only

      - name: Set scheduler metadata
        env:
          INPUT_SCHEDULED_AT_TAIPEI: ${{ inputs.scheduled_at_taipei }}
          INPUT_SCHEDULER: ${{ inputs.scheduler }}
          INPUT_SCHEDULER_CRON: ${{ inputs.scheduler_cron }}
        run: |
          task="telegram"
          scheduler="${INPUT_SCHEDULER:-${GITHUB_EVENT_NAME}}"
          cron="${INPUT_SCHEDULER_CRON:-${{ github.event.schedule }}}"
          target="${INPUT_SCHEDULED_AT_TAIPEI}"
          if [ -z "$target" ]; then
            case "${{ github.event.schedule }}" in
              "20 23 * * 0-4") target="$(TZ=Asia/Taipei date +'%Y-%m-%d')T07:20:00+08:00" ;;
              "35 23 * * 0-4") target="$(TZ=Asia/Taipei date +'%Y-%m-%d')T07:35:00+08:00" ;;
              "50 23 * * 0-4") target="$(TZ=Asia/Taipei date +'%Y-%m-%d')T07:50:00+08:00" ;;
              "5 0 * * 1-5") target="$(TZ=Asia/Taipei date +'%Y-%m-%d')T08:05:00+08:00" ;;
            esac
          fi
          {
            echo "SCHEDULED_TASK=$task"
            echo "SCHEDULED_BY=$scheduler"
            echo "SCHEDULED_CRON=$cron"
            echo "SCHEDULED_TARGET_TAIPEI=$target"
          } >> "$GITHUB_ENV"

      - name: Send Telegram morning report
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py --send-telegram --telegram-summary

      - name: Commit Telegram delivery log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tw_stock_ai.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No delivery log changes"
            exit 0
          fi
          git commit -m "chore: record telegram delivery $(date -u +'%Y-%m-%d') [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Delivery log push failed on attempt ${attempt}; rebasing latest main and retrying."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          echo "Failed to persist Telegram delivery log after retries."
          exit 1

      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Taiwan Stock AI Telegram morning report failed. Please check GitHub Actions."
          fi
