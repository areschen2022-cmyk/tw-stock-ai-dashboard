name: 台股 AI 每日早報

on:
  # 08:30 台灣時間 (UTC+8) 週一至週五
  schedule:
    - cron: '30 0 * * 1-5'
  # 手動觸發（測試用）
  workflow_dispatch:

jobs:
  scan:
    name: 掃描選股並推送通知
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 完整歷史紀錄，確保 git push 正常運作
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --send-telegram --telegram-summary

      - name: Commit dashboard and database updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage generated files only — never commit .env or secrets
          git add dashboard/ data/tw_stock_ai.sqlite3 || true
          # Skip commit if nothing changed
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily scan $(date -u +'%Y-%m-%d') [skip ci]"

      - name: Push updates
        run: git push
