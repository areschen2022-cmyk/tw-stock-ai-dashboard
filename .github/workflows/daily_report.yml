name: Daily Taiwan Stock AI Report

on:
  workflow_dispatch:
  schedule:
    # 08:20 Asia/Taipei, Monday-Friday.
    - cron: "20 0 * * 1-5"

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily report
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --send-telegram --telegram-summary

      - name: Publish GitHub Pages files
        shell: pwsh
        run: ./scripts/publish_pages.ps1 -Message "Automated daily dashboard update"

      - name: Notify on failure
        if: failure()
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if ($env:TELEGRAM_BOT_TOKEN -and $env:TELEGRAM_CHAT_ID) {
            $text = "台股 AI 每日任務失敗，請檢查 GitHub Actions。"
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" -Method Post -Body @{
              chat_id = $env:TELEGRAM_CHAT_ID
              text = $text
            }
          }
