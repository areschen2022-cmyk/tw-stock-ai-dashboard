name: Taiwan Stock AI Daily

on:
  push:
    branches:
      - main
  schedule:
    # 07:05 / 07:35 Asia/Taipei, Monday-Friday: update GitHub Pages dashboard.
    - cron: "5 23 * * 0-4"
    - cron: "35 23 * * 0-4"
    # 08:10 / 08:25 Asia/Taipei, Monday-Friday: send Telegram morning report.
    - cron: "10 0 * * 1-5"
    - cron: "25 0 * * 1-5"
  workflow_dispatch:
    inputs:
      send_telegram:
        description: "Also send Telegram report"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: tw-stock-ai-daily
  cancel-in-progress: false

jobs:
  dashboard-update:
    name: 07:05/07:35 update dashboard
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '5 23 * * 0-4' ||
      github.event.schedule == '35 23 * * 0-4'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard without Telegram
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py --dry-run --telegram-summary

      - name: Commit and push dashboard
        run: |
          git fetch origin main
          current_head="$(git rev-parse HEAD)"
          remote_head="$(git rev-parse origin/main)"
          if [ "$current_head" != "$remote_head" ]; then
            echo "Remote main moved from ${current_head} to ${remote_head}."
            echo "This workflow run is stale, so dashboard output will not be pushed."
            exit 0
          fi
          mkdir -p docs
          cp -f dashboard/index.html docs/index.html
          cp -f dashboard/dashboard_data.json docs/dashboard_data.json
          cp -f dashboard/performance.html docs/performance.html
          cp -f dashboard/performance_data.json docs/performance_data.json
          cp -f dashboard/theme_history.json docs/theme_history.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/
          git add docs/
          git add data/tw_stock_ai.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No dashboard changes"
            exit 0
          fi
          git commit -m "auto: dashboard $(date -u +'%Y-%m-%d')"
          if ! git push 2>push.err; then
            cat push.err
            if grep -qE "fetch first|non-fast-forward|failed to push some refs" push.err; then
              echo "Remote main changed during this run; skip stale dashboard push."
              exit 0
            fi
            exit 1
          fi

      - name: Notify dashboard failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Taiwan Stock AI dashboard update failed. Please check GitHub Actions."
          fi

  morning-telegram:
    name: 08:10/08:25 send Telegram
    if: >-
      github.event.schedule == '10 0 * * 1-5' ||
      github.event.schedule == '25 0 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.send_telegram == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest persisted state
        run: git pull --ff-only

      - name: Send Telegram morning report
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py --send-telegram --telegram-summary

      - name: Commit Telegram delivery log
        run: |
          git fetch --quiet origin main
          current_head="$(git rev-parse HEAD)"
          remote_head="$(git rev-parse origin/main)"
          if [ "$current_head" != "$remote_head" ]; then
            echo "Remote main moved from ${current_head} to ${remote_head}; cannot safely persist delivery log."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tw_stock_ai.sqlite3 || true
          if git diff --cached --quiet; then
            echo "No delivery log changes"
            exit 0
          fi
          git commit -m "chore: record telegram delivery $(date -u +'%Y-%m-%d') [skip ci]"
          git push

      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Taiwan Stock AI Telegram morning report failed. Please check GitHub Actions."
          fi
